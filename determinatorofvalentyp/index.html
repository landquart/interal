<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Determinator of valen typ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/ui.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <h1>Determinator of valen typ</h1>
    </header>

    <section class="panel">
      <label class="field">
        <span>1 — Слово по регулярной модели (с разделителями)</span>
        <input id="regularWord" type="text" autocomplete="off" />
      </label>

      <div class="field">
        <span>2 — Анализ компонентов</span>
        <div id="componentsList" class="components-list empty">Компоненты не добавлены.</div>
        <div id="componentsSummary" class="components-summary">—</div>
        <button id="addComponentBtn" class="plus-btn" type="button" aria-label="Добавить компонент">+</button>
      </div>

      <label class="field">
        <span>3 — Логический анализ компонентов</span>
        <textarea id="logicalMeaning" rows="3"></textarea>
      </label>

      <label class="field">
        <span>4 — Интернациональное значение эквивалентного деривата</span>
        <textarea id="internationalMeaning" rows="3"></textarea>
      </label>

      <label class="field">
        <span>5 — Слово по натуралистичной модели (с разделителями)</span>
        <input id="naturalisticWord" type="text" autocomplete="off" />
      </label>

      <details class="details-panel">
        <summary>Локальная нейросеть для семантической дистанции</summary>
        <label class="check-row">
          <input id="useLlm" type="checkbox" />
          <span>Использовать локальную модель</span>
        </label>
        <label class="field compact-field">
          <span>Ollama URL</span>
           <input id="ollamaUrl" type="text" value="http://localhost:11434" />
        </label>
        <label class="field compact-field">
          <span>Модель</span>
           <input id="ollamaModel" type="text" value="qwen3-embedding" />
        </label>
      </details>

      <div class="actions">
        <button id="analyzeBtn" type="button">Анализировать</button>
        <button id="clearBtn" type="button" class="ghost">Очистить</button>
      </div>
    </section>

    <section class="panel">
      <h2>Результат</h2>
      <div id="result" class="result empty">Заполните поля и нажмите «Анализировать».</div>
    </section>
  </main>

  <div id="chooserModal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close-modal="true"></div>
    <div class="modal-card chooser-card" role="dialog" aria-modal="true" aria-labelledby="chooserTitle">
      <div class="modal-header center-header">
        <h2 id="chooserTitle">Добавить элемент</h2>
        <button class="icon-btn" type="button" data-close-modal="true">×</button>
      </div>
      <div class="chooser-grid">
        <button id="chooseRootBtn" class="chooser-option" type="button">Первичное корневое слово</button>
        <button id="chooseComponentBtn" class="chooser-option" type="button">Компонент (аффикс/окончание)</button>
      </div>
    </div>
  </div>

  <div id="rootModal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close-modal="true"></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="rootTitle">
      <div class="modal-header">
        <button id="backFromRootBtn" class="back-btn" type="button">Назад</button>
        <h2 id="rootTitle">Первичное корневое слово</h2>
        <button class="icon-btn" type="button" data-close-modal="true">×</button>
      </div>

      <label class="field compact-field">
        <span>Слово</span>
        <input id="rootFormInput" type="text" autocomplete="off" />
      </label>

      <label class="field compact-field">
        <span>Значение</span>
        <input id="rootMeaningInput" type="text" autocomplete="off" />
      </label>

      <label class="field compact-field">
        <span>Тип ассимиляции</span>
        <select id="assimilationSelect"></select>
      </label>

      <div class="actions modal-actions">
        <button id="saveRootBtn" type="button">Добавить</button>
      </div>
    </div>
  </div>

  <div id="componentModal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close-modal="true"></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="componentTitle">
      <div class="modal-header">
        <button id="backFromComponentBtn" class="back-btn" type="button">Назад</button>
        <h2 id="componentTitle">Компонент</h2>
        <button class="icon-btn" type="button" data-close-modal="true">×</button>
      </div>

      <label class="field compact-field">
        <span>Категория</span>
        <select id="componentCategorySelect"></select>
      </label>

      <label class="field compact-field">
        <span>Элемент</span>
        <select id="componentSelect"></select>
      </label>

      <div id="componentMeaningPreview" class="preview-box">—</div>

      <div class="actions modal-actions">
        <button id="saveComponentBtn" type="button">Добавить</button>
      </div>
    </div>
  </div>

  <div id="prefixVariantModal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close-modal="true"></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="prefixVariantTitle">
      <div class="modal-header">
        <button id="backFromPrefixVariantBtn" class="back-btn" type="button">Назад</button>
        <h2 id="prefixVariantTitle">Ассимиляция приставки</h2>
        <button class="icon-btn" type="button" data-close-modal="true">×</button>
      </div>

      <label class="field compact-field">
        <span>Вариант приставки</span>
        <select id="prefixVariantSelect"></select>
      </label>

      <div id="prefixVariantPreview" class="preview-box">—</div>

      <div class="actions modal-actions">
        <button id="savePrefixVariantBtn" type="button">Добавить</button>
      </div>
    </div>
  </div>

  <script src="../shared/ui.js"></script>
  <script src="app.js"></script>
</body>
</html>
