<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon%20interal%2032.png" />
  <link rel="icon" type="image/png" sizes="64x64" href="favicon/favicon%20interal%2064.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="favicon/favicon%20interal%20512.png" />
  <title>Interal</title>
  <link rel="stylesheet" href="shared/ui.css" />

  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Jost", "Helvetica Neue", Helvetica, Arial, sans-serif; min-height: 100vh; padding: 16px; line-height:1.5; }
    body.homepage.has-global-menu { padding-top: 72px !important; }
   .home-wrap { width:min(1080px,100%); margin: 0 auto; }
    .hero { width:100%; border-radius:24px; overflow:hidden; margin-bottom:20px; position:relative; min-height: clamp(220px, 38vh, 380px); display:grid; place-items:center; background:#0f0f0f; }
    .hero-bg { width:100%; height:100%; object-fit:cover; display:block; opacity:.78; }
    .home-brand { position:absolute; inset:0; display:flex; flex-direction:column; justify-content:center; align-items:center; text-decoration:none; color:#fff; gap:4px; text-align:center; }
    .home-logo { width:160px; height:160px; filter: brightness(0) invert(1); }
    .home-title { margin: 0; font-size: clamp(2rem, 4vw, 2.6rem); letter-spacing: .5px; color:#fff; text-shadow: none; }
    .homepage .container {
      width: 100%;
      text-align: center;
      display: grid !important;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin:0;
      padding:0;
      gap: 18px;
      align-items: stretch;
    }
    .tool-link {
      position: relative;
      isolation: isolate;
      display: grid;
      width: 100%;
      min-height: 212px;
      padding: 20px;
      text-decoration: none;
      border-radius: 20px;
      background: var(--surface);
      border: 1px solid color-mix(in srgb,var(--text) 18%, transparent);
      box-shadow: none;
      justify-items: center !important;
      align-content: center;
      transition: transform .2s ease, border-color .2s ease, background-color .2s ease;
    }
    .tool-icon-wrap {
      width: 72px;
      height: 72px;
      border-radius: var(--radius-sm);
      background: var(--surface-soft);
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      margin-bottom: 12px;
      transition: background-color .35s ease, transform .35s cubic-bezier(.2,.8,.2,1);
    }
    .tool-icon { width: 42px; height: 42px; }
    .tool-link-main {
      line-height:1.3;
      font-weight: 700;
      text-decoration: none;
      font-size: 1rem;
      color: var(--text);
      text-shadow: none;
      letter-spacing: .2px;
    }
    body.homepage .tool-link {
      justify-items: center !important;
      align-content: center !important;
      text-align: center !important;
      gap: 6px;
    }
    .tool-link-sub {
      display: block;
      font-size: .9rem;
      margin-top: 4px;
      color: var(--text-muted);
      text-shadow: none;
    }
    @media (min-width: 861px) {
      .hero-bg { border-radius: 48px; }
    }
    @media (max-width: 860px) {
      .homepage .container { grid-template-columns: 1fr !important; }
      .tool-link { width: 100%; min-height: 180px; }
      .hero { min-height: clamp(220px, 34vh, 320px); border-radius:22px; margin-bottom: 10px; }
      .hero-bg { width:100%; height:100%; object-fit:cover; }
      .home-brand { padding: 18px 12px; justify-content:center; }
      .home-logo { width: clamp(84px, 26vw, 128px); height: clamp(84px, 26vw, 128px); }
      .home-title { font-size: clamp(1.4rem, 7vw, 2.1rem); max-width: 100%; word-break: break-word; }
    }
     .tool-link:hover, .tool-link:focus-visible { transform: translateY(-2px); border-color: color-mix(in srgb,var(--text) 40%, transparent); }
    .tool-link:focus-visible { outline: 2px solid var(--text); outline-offset: 2px; }
  </style>
</head>
<body class="homepage">
  <div class="home-wrap">
     <div class="hero"><img class="hero-bg" src="elements/trippy_gold_black_loop.svg" alt="" /><a class="home-brand" href="index.html" aria-label="Interal home">
        <img class="home-logo" src="favicon/favicon%20interal%20512.png" alt="Interal logo" />
        <h1 class="home-title">Interal</h1>
    </a></div><div class="container">

      <a class="tool-link" href="similarita/">
        <span class="tool-icon-wrap"><img class="tool-icon" src="elements/similarita.svg" alt="" aria-hidden="true" /></span>
        <span class="tool-link-main" data-i18n="home.similaritaMain">Similaritá</span>
        <span class="tool-link-sub" data-i18n="home.similaritaSub">Похожесть</span>
      </a>
      <a class="tool-link" href="associativvordes/">
        <span class="tool-icon-wrap"><img class="tool-icon" src="elements/associativ%20vordes.svg" alt="" aria-hidden="true" /></span>
        <span class="tool-link-main" data-i18n="home.assocMain">Associativ vordes</span>
        <span class="tool-link-sub" data-i18n="home.assocSub">Ассоциативные слова</span>
      </a>
      <a class="tool-link" href="determinatorofvalentyp/">
        <span class="tool-icon-wrap"><img class="tool-icon" src="elements/determinator%20of%20valen%20typ.svg" alt="" aria-hidden="true" /></span>
        <span class="tool-link-main" data-i18n="home.determMain">Determinator of valen typ</span>
        <span class="tool-link-sub" data-i18n="home.determSub">Определитель типа значения</span>
      </a>
    </div>
  </div>

  <script src="shared/ui.js"></script>
  <script>
    (function () {
      const dict = {
        ru: {
          'home.similaritaMain': 'Similaritá',
          'home.assocMain': 'Associativ vordes',
          'home.determMain': 'Determinator of valen typ',
          'home.similaritaSub': 'Похожесть',
          'home.assocSub': 'Ассоциативные слова',
          'home.determSub': 'Определитель типа значения'
        },
        en: {
          'home.similaritaMain': 'Similaritá',
          'home.assocMain': 'Associativ vordes',
          'home.determMain': 'Determinator of valen typ',
          'home.similaritaSub': 'Similarity',
          'home.assocSub': 'Associative words',
          'home.determSub': 'Value type determinator'
        }
      };
      function apply(lang) {
        document.querySelectorAll('[data-i18n]').forEach((el) => {
          const key = el.getAttribute('data-i18n');
          el.textContent = (dict[lang] && dict[lang][key]) || (dict.ru[key] || el.textContent);
        });
      }
      apply(localStorage.getItem('interal.lang') === 'en' ? 'en' : 'ru');
      document.addEventListener('interal:languagechange', (e) => apply(e.detail.lang));
    })();
  </script>
</body>
</html>
